<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Box Overview</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e8f5e9, #d0f0d8, #c8e6c9);
            color: #1d1d1f;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px 72px;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(240px, 1fr));
            gap: 20px;
        }

        .grid-wrapper {
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tile {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .tile h2 {
            margin: 0 0 12px;
            font-size: 22px;
        }

        .tile p {
            margin: 8px 0;
            font-size: 16px;
        }

        .label {
            color: #6e6e73;
            font-weight: 600;
        }

        .count {
            font-size: 24px;
            font-weight: 700;
        }

        .low {
            color: #b26a00;
        }

        .empty {
            color: #b00020;
        }

        a {
            display: inline-block;
            margin-top: 12px;
            color: #2e7d32;
            font-weight: 600;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Seed Box Overview</h1>
<div class="grid-wrapper">
    <div id="grid" class="grid"></div>
    </div>
</div>

<script>
    // fixes bug (feature) where manual refresh to re-fetch data when returning to index overview
    window.addEventListener("pageshow", () => {
        loadOverview();
    });

    async function loadOverview() {
        const response = await fetch("/api/seed-boxes");
        const boxes = await response.json();

        const grid = document.getElementById("grid");
        grid.innerHTML = "";

        boxes.forEach(box => {
            let countClass = "";
            if (box.packageCount === 0) {
                countClass = "empty";
            } else if (box.packageCount <= 2) {
                countClass = "low";
            }

            const tile = document.createElement("a");
            tile.className = "tile";
            tile.href = `/box.html?box=${box.boxLabel}`;
            tile.style.textDecoration = "none";
            tile.style.color = "inherit";

            tile.innerHTML = `
                <h2>${box.boxLabel}</h2>
                <p><span class="label">Seed:</span> ${box.seedType.name}</p>
                <p><span class="label">Packages:</span> <span class="count ${countClass}">${box.packageCount}</span></p>
                <p><span class="label">Notes:</span> ${box.notes ?? ""}</p>
                <a href="/box.html?box=${box.boxLabel}">Open box</a>
            `;

            grid.appendChild(tile);
        });
    }

    loadOverview();
</script>
</body>
</html>
